<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Pass System - Gem Drytech Systems LLP</title>
  <!-- Favicon -->
  <link rel="icon" href="https://img.icons8.com/color/48/000000/visitor-pass.png" type="image/png">
  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #1a2980 0%, #26d0ce 100%);
      color: white;
      padding: 25px;
      text-align: center;
      position: relative;
    }
    
    .company-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .title {
      font-size: 32px;
      font-weight: 700;
    }
    
    .form-container {
      padding: 30px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 25px;
    }
    
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .full-width {
      grid-column: 1 / -1;
    }
    
    label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #2c3e50;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    
    label i {
      margin-right: 8px;
      color: #3498db;
    }
    
    .required::after {
      content: " *";
      color: #e74c3c;
    }
    
    input, select, textarea {
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
      background: #f8f9fa;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3498db;
      background: white;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .visitor-id-section {
      background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    #nextVisitorId {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 10px 0;
      font-family: 'Courier New', monospace;
      color: #ffeb3b;
    }
    
    .photo-section {
      border: 2px dashed #3498db;
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      background: #f8f9fa;
    }
    
    .photo-preview-container {
      width: 180px;
      height: 220px;
      margin: 0 auto 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    #photoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ecf0f1;
      color: #7f8c8d;
    }
    
    .photo-placeholder i {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    .camera-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .camera-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      min-width: 160px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
    }
    
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
    }
    
    .submit-btn {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
      padding: 18px 40px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
    }
    
    .submit-btn:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }
    
    .loading {
      text-align: center;
      padding: 30px;
      display: none;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .message {
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      display: none;
      text-align: center;
    }
    
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .camera-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .camera-container {
      width: 90%;
      max-width: 500px;
      background: white;
      border-radius: 15px;
      overflow: hidden;
    }
    
    #cameraView {
      width: 100%;
      height: 400px;
      background: #000;
      display: block;
    }
    
    .stats-info {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    
    .stat-item {
      text-align: center;
      flex: 1;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #ffeb3b;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.9);
    }
    
    .url-display {
      background: #e8f4fd;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      word-break: break-all;
      font-size: 12px;
      text-align: left;
    }
    
    .copy-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="company-name">Gem Drytech Systems LLP</div>
      <div class="title">VISITOR PASS SYSTEM</div>
    </div>
    
    <div class="form-container">
      <!-- Visitor ID Section -->
      <div class="visitor-id-section">
        <div class="visitor-id-label">Next Visitor ID</div>
        <div id="nextVisitorId">Loading...</div>
        <div class="id-format">Format: GD + DDMMYY + 001</div>
        <div class="stats-info">
          <div class="stat-item">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">Today</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="activeCount">0</div>
            <div class="stat-label">Active</div>
          </div>
        </div>
      </div>
      
      <div class="form-grid">
        <!-- Form Fields -->
        <div class="form-group">
          <label for="visitorName" class="required"><i class="fas fa-user"></i> Visitor Name</label>
          <input type="text" id="visitorName" required placeholder="Enter full name">
        </div>
        
        <div class="form-group">
          <label for="companyName" class="required"><i class="fas fa-building"></i> Company Name</label>
          <input type="text" id="companyName" required placeholder="Enter company name">
        </div>
        
        <div class="form-group">
          <label for="contactNumber" class="required"><i class="fas fa-phone"></i> Contact Number</label>
          <input type="tel" id="contactNumber" required placeholder="10-digit mobile number">
        </div>
        
        <div class="form-group">
          <label for="personToMeet" class="required"><i class="fas fa-handshake"></i> Person to Meet</label>
          <input type="text" id="personToMeet" required placeholder="Name of person">
        </div>
        
        <div class="form-group full-width">
          <label for="visitorAddress"><i class="fas fa-map-marker-alt"></i> Visitor Address (Optional)</label>
          <textarea id="visitorAddress" rows="2" placeholder="Enter visitor's address"></textarea>
        </div>
        
        <div class="form-group">
          <label for="areaToVisit" class="required"><i class="fas fa-map-signs"></i> Area to Visit</label>
          <select id="areaToVisit" required>
            <option value="">Select area</option>
            <option value="Office">Office</option>
            <option value="Production Area">Production Area</option>
            <option value="Office/Production Area">Office/Production Area</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="purpose" class="required"><i class="fas fa-bullseye"></i> Purpose of Visit</label>
          <select id="purpose" required>
            <option value="">Select purpose</option>
            <option value="Business Meeting">Business Meeting</option>
            <option value="Delivery">Delivery</option>
            <option value="Interview">Interview</option>
            <option value="Service/Maintenance">Service/Maintenance</option>
            <option value="Client Meeting">Client Meeting</option>
            <option value="Training">Training</option>
            <option value="Official Work">Official Work</option>
            <option value="Vendor Meeting">Vendor Meeting</option>
            <option value="Personal Meeting">Personal Meeting</option>
            <option value="Other">Other</option>
          </select>
        </div>
        
        <div class="form-group full-width" id="otherPurposeGroup" style="display:none;">
          <label for="purposeDetails"><i class="fas fa-edit"></i> Please specify purpose</label>
          <textarea id="purposeDetails" rows="2" placeholder="Enter purpose details"></textarea>
        </div>
        
        <!-- Photo Section -->
        <div class="form-group full-width">
          <div class="photo-section">
            <div class="photo-preview-container">
              <div id="photoPlaceholder" class="photo-placeholder">
                <i class="fas fa-camera"></i>
                <span>No photo captured</span>
              </div>
              <img id="photoPreview" alt="Visitor Photo">
            </div>
            
            <div class="camera-buttons">
              <button type="button" class="camera-btn btn-primary" onclick="openCamera()">
                <i class="fas fa-camera"></i> Take Photo
              </button>
              <button type="button" class="camera-btn btn-secondary" onclick="uploadPhoto()">
                <i class="fas fa-upload"></i> Upload Photo
              </button>
              <button type="button" class="camera-btn btn-danger" onclick="clearPhoto()" style="display:none;" id="clearPhotoBtn">
                <i class="fas fa-trash"></i> Clear Photo
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Hidden file input -->
      <input type="file" id="photoInput" accept="image/*" style="display:none;">
      
      <!-- Camera Modal -->
      <div class="camera-modal" id="cameraModal">
        <div class="camera-container">
          <div class="camera-header" style="background:#2c3e50;color:white;padding:15px;display:flex;justify-content:space-between;">
            <span><i class="fas fa-camera"></i> Take Photo</span>
            <button onclick="closeCamera()" style="background:none;border:none;color:white;cursor:pointer;font-size:20px;">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <video id="cameraView" autoplay playsinline style="width:100%;height:400px;background:#000;"></video>
          <div class="camera-controls" style="padding:15px;background:#f8f9fa;display:flex;gap:10px;justify-content:center;">
            <button class="camera-btn btn-primary" onclick="capturePhoto()">
              <i class="fas fa-camera"></i> Capture
            </button>
            <button class="camera-btn btn-danger" onclick="closeCamera()">
              <i class="fas fa-times"></i> Cancel
            </button>
          </div>
        </div>
      </div>
      
      <!-- Loading Indicator -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Processing and generating PDF...</p>
      </div>
      
      <!-- Submit Button -->
      <button class="submit-btn" onclick="submitForm()" id="submitBtn">
        <i class="fas fa-file-pdf"></i> GENERATE & DOWNLOAD VISITOR PASS
      </button>
      
      <!-- Message Display -->
      <div class="message" id="message"></div>
    </div>
  </div>
  
  <script>
    // ================================================
    // CONFIGURATION - UPDATE THIS WITH YOUR APPS SCRIPT URL
    // ================================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaq-JRSudrABpbEC-ez2y6eD92Pc8qfAz7ol6KL414NZjnyMZAw0H1924LffrGOpcu/exec';
    
    // Global variables
    let photoBase64 = '';
    let cameraStream = null;
    let currentPurpose = '';
    const { jsPDF } = window.jspdf;
    
    // ================================================
    // INITIALIZATION
    // ================================================
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Page loaded');
      
      loadSystemStats();
      
      // Purpose dropdown handler
      document.getElementById('purpose').addEventListener('change', function() {
        const otherGroup = document.getElementById('otherPurposeGroup');
        otherGroup.style.display = this.value === 'Other' ? 'block' : 'none';
      });
      
      // Phone validation
      document.getElementById('contactNumber').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '').slice(0, 10);
      });
      
      // File input handler
      document.getElementById('photoInput').addEventListener('change', handleFileSelect);
    });
    
    // ================================================
    // API CALLS
    // ================================================
    
    async function loadSystemStats() {
      try {
        const response = await fetch(`${APPS_SCRIPT_URL}?action=checkSystemStatus`, {
          method: 'GET',
          mode: 'cors',
          headers: {
            'Content-Type': 'text/plain',
          }
        });
        
        if (response.ok) {
          const result = await response.json();
          console.log('Stats loaded:', result);
          
          if (result.success) {
            document.getElementById('nextVisitorId').textContent = result.nextVisitorId;
            document.getElementById('todayCount').textContent = result.todayStats.totalToday;
            document.getElementById('totalCount').textContent = result.sheetRows;
            document.getElementById('activeCount').textContent = result.activeCount;
          } else {
            setDefaultVisitorId();
          }
        } else {
          setDefaultVisitorId();
        }
      } catch (error) {
        console.error('Error loading stats:', error);
        setDefaultVisitorId();
      }
    }
    
    function setDefaultVisitorId() {
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yy = String(today.getFullYear()).slice(2);
      const defaultId = 'GD' + dd + mm + yy + '001';
      document.getElementById('nextVisitorId').textContent = defaultId;
    }
    
    async function submitForm() {
      const validation = validateForm();
      
      if (!validation.isValid) {
        const errorMessage = validation.errors.join('<br>');
        showMessage(`<i class="fas fa-exclamation-circle"></i> Please fix the following errors:<br>${errorMessage}`, 'error');
        return;
      }
      
      // Prepare form data
      const formData = {
        visitorName: document.getElementById('visitorName').value.trim(),
        companyName: document.getElementById('companyName').value.trim(),
        contactNumber: document.getElementById('contactNumber').value.trim(),
        visitorAddress: document.getElementById('visitorAddress').value.trim(),
        personToMeet: document.getElementById('personToMeet').value.trim(),
        areaToVisit: document.getElementById('areaToVisit').value.trim(),
        purpose: currentPurpose,
        photo: photoBase64
      };
      
      // Show loading
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('message').style.display = 'none';
      
      try {
        // Send to Apps Script using no-cors mode to avoid preflight
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8',
          },
          body: JSON.stringify(formData)
        });
        
        // Generate visitor ID locally
        const visitorId = generateLocalVisitorId();
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '/');
        const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        
        // Generate PDF with local data
        await generateAndDownloadPDF(formData, {
          visitorId: visitorId,
          date: dateStr,
          time: timeStr,
          photoDriveUrl: ''
        });
        
        showMessage(`
          <div style="text-align:center;">
            <h3 style="color:#27ae60;">✓ Visitor Pass Created Successfully!</h3>
            <div style="background:#e8f4fd; padding:15px; margin:15px 0;">
              <div style="font-size:14px;">Visitor ID</div>
              <div style="font-size:28px; font-weight:bold;">${visitorId}</div>
              <div>${formData.visitorName} | ${dateStr} ${timeStr}</div>
            </div>
            <p>Data will appear in Google Sheets shortly.</p>
            <button onclick="clearForm()" style="background:#2ecc71;color:white;padding:12px 30px;border:none;border-radius:5px;cursor:pointer;margin-top:15px;">
              Create Another Pass
            </button>
          </div>
        `, 'success');
        
        // Update stats
        document.getElementById('nextVisitorId').textContent = generateLocalVisitorId();
        
      } catch (error) {
        console.error('Submission error:', error);
        showMessage('Connection error. Please try again. Your data will be saved when connection is restored.', 'error');
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
      }
    }
    
    function generateLocalVisitorId() {
      const now = new Date();
      const dd = String(now.getDate()).padStart(2, '0');
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const yy = String(now.getFullYear()).slice(2);
      return 'GD' + dd + mm + yy + '001';
    }
    
    // ================================================
    // CAMERA FUNCTIONS
    // ================================================
    
    async function openCamera() {
      const modal = document.getElementById('cameraModal');
      const video = document.getElementById('cameraView');
      
      modal.style.display = 'flex';
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: false 
        });
        
        cameraStream = stream;
        video.srcObject = stream;
        
      } catch (err) {
        console.error('Camera error:', err);
        alert('Cannot access camera. Please use the upload option instead.');
        closeCamera();
      }
    }
    
    function closeCamera() {
      const modal = document.getElementById('cameraModal');
      const video = document.getElementById('cameraView');
      
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      
      video.srcObject = null;
      modal.style.display = 'none';
    }
    
    function capturePhoto() {
      const video = document.getElementById('cameraView');
      const canvas = document.createElement('canvas');
      
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      photoBase64 = canvas.toDataURL('image/jpeg', 0.8);
      updatePhotoPreview(photoBase64);
      
      closeCamera();
      
      showMessage('Photo captured successfully!', 'success');
      setTimeout(() => {
        document.getElementById('message').style.display = 'none';
      }, 2000);
    }
    
    function uploadPhoto() {
      document.getElementById('photoInput').click();
    }
    
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      if (!file.type.match('image.*')) {
        alert('Please select an image file');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        photoBase64 = e.target.result;
        updatePhotoPreview(photoBase64);
        
        showMessage('Photo uploaded successfully!', 'success');
        setTimeout(() => {
          document.getElementById('message').style.display = 'none';
        }, 2000);
      };
      reader.readAsDataURL(file);
      
      event.target.value = '';
    }
    
    function updatePhotoPreview(base64Data) {
      const preview = document.getElementById('photoPreview');
      const placeholder = document.getElementById('photoPlaceholder');
      const clearBtn = document.getElementById('clearPhotoBtn');
      
      preview.src = base64Data;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      clearBtn.style.display = 'flex';
    }
    
    function clearPhoto() {
      const preview = document.getElementById('photoPreview');
      const placeholder = document.getElementById('photoPlaceholder');
      const clearBtn = document.getElementById('clearPhotoBtn');
      
      preview.style.display = 'none';
      preview.src = '';
      placeholder.style.display = 'flex';
      clearBtn.style.display = 'none';
      photoBase64 = '';
    }
    
    // ================================================
    // FORM VALIDATION
    // ================================================
    
    function validateForm() {
      let isValid = true;
      const errors = [];
      
      const requiredFields = [
        { id: 'visitorName', name: 'Visitor Name' },
        { id: 'companyName', name: 'Company Name' },
        { id: 'contactNumber', name: 'Contact Number' },
        { id: 'personToMeet', name: 'Person to Meet' },
        { id: 'areaToVisit', name: 'Area to Visit' },
        { id: 'purpose', name: 'Purpose' }
      ];
      
      requiredFields.forEach(field => {
        const element = document.getElementById(field.id);
        const value = element.value.trim();
        
        if (!value) {
          isValid = false;
          element.classList.add('error-field');
          errors.push(`${field.name} is required`);
        } else {
          element.classList.remove('error-field');
        }
      });
      
      const phone = document.getElementById('contactNumber').value.trim();
      if (phone && !/^[0-9]{10}$/.test(phone)) {
        document.getElementById('contactNumber').classList.add('error-field');
        isValid = false;
        errors.push('Contact number must be exactly 10 digits');
      }
      
      const purpose = document.getElementById('purpose').value;
      if (purpose === 'Other') {
        const details = document.getElementById('purposeDetails').value.trim();
        currentPurpose = details || 'Other';
      } else {
        currentPurpose = purpose;
      }
      
      return { isValid, errors };
    }
    
// ================================================
// FIXED PDF GENERATION - Proper Half A4 Format
// ================================================

async function generateAndDownloadPDF(formData, resultData) {
  return new Promise((resolve) => {
    try {
      // Half A4 dimensions in mm (A4 = 210mm x 297mm, half = 148mm x 105mm)
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: [148, 105] // Half A4 landscape
      });
      
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      
      // Margins
      const margin = 5;
      const contentWidth = pageWidth - (margin * 2);
      
      // Split page into two columns: 60% details, 40% photo
      const detailsWidth = contentWidth * 0.6;  // 60% for visitor details
      const photoWidth = contentWidth * 0.35;   // 35% for photo
      const photoX = margin + detailsWidth + 5;  // X position for photo
      
      let yPos = margin + 5; // Starting Y position
      
      // ============================================
      // COMPANY HEADER
      // ============================================
      doc.setFillColor(41, 128, 185); // Blue background
      doc.rect(margin, yPos - 3, contentWidth, 12, 'F');
      
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text('GEM DRYTECH SYSTEMS LLP', pageWidth / 2, yPos + 2, { align: 'center' });
      
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.text('VISITOR PASS', pageWidth / 2, yPos + 7, { align: 'center' });
      
      yPos += 12;
      
      // ============================================
      // VISITOR ID (Prominent)
      // ============================================
      doc.setFillColor(240, 240, 240); // Light gray background
      doc.rect(margin, yPos - 2, detailsWidth, 10, 'F');
      
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.text('Visitor ID:', margin + 2, yPos + 2);
      
      doc.setTextColor(41, 128, 185);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text(resultData.visitorId, margin + 25, yPos + 2);
      
      yPos += 12;
      
      // ============================================
      // VISITOR DETAILS SECTION
      // ============================================
      const lineHeight = 5;
      const labelX = margin + 2;
      const valueX = margin + 40;
      
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(8);
      
      // Function to add a detail row
      function addDetailRow(label, value, maxLength = 30) {
        doc.setFont('helvetica', 'bold');
        doc.text(label + ':', labelX, yPos);
        
        doc.setFont('helvetica', 'normal');
        const displayValue = value.length > maxLength ? value.substring(0, maxLength) + '...' : value;
        doc.text(displayValue, valueX, yPos);
        
        yPos += lineHeight;
      }
      
      // Add all visitor details
      addDetailRow('Name', formData.visitorName);
      addDetailRow('Company', formData.companyName);
      addDetailRow('Contact', formData.contactNumber);
      
      if (formData.visitorAddress) {
        addDetailRow('Address', formData.visitorAddress, 35);
      }
      
      addDetailRow('Meeting With', formData.personToMeet);
      addDetailRow('Area', formData.areaToVisit);
      addDetailRow('Purpose', formData.purpose, 35);
      addDetailRow('Date', resultData.date);
      addDetailRow('Time', resultData.time);
      
      // ============================================
      // PHOTO SECTION (FIXED POSITION)
      // ============================================
      const photoY = margin + 15; // Fixed Y position for photo
      
      // Photo frame
      doc.setDrawColor(0, 0, 0);
      doc.setLineWidth(0.3);
      doc.rect(photoX, photoY, photoWidth, 35, 'D');
      
      // Photo label
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(100, 100, 100);
      doc.text('VISITOR PHOTO', photoX + (photoWidth/2), photoY - 2, { align: 'center' });
      
      // Add photo if available
      if (formData.photo && formData.photo !== '') {
        try {
          // Calculate photo dimensions to fit properly
          const imgProps = doc.getImageProperties(formData.photo);
          const imgWidth = photoWidth - 4;
          const imgHeight = (imgProps.height * imgWidth) / imgProps.width;
          
          // Center photo vertically in frame
          const imgY = photoY + 2 + ((35 - 4 - imgHeight) / 2);
          
          doc.addImage(
            formData.photo, 
            'JPEG', 
            photoX + 2, 
            imgY, 
            imgWidth - 4, 
            imgHeight
          );
        } catch (error) {
          console.error('Error adding photo:', error);
          doc.setFontSize(7);
          doc.setTextColor(150, 150, 150);
          doc.text('Photo unavailable', photoX + photoWidth/2, photoY + 17, { align: 'center' });
        }
      } else {
        doc.setFontSize(7);
        doc.setTextColor(150, 150, 150);
        doc.text('No photo uploaded', photoX + photoWidth/2, photoY + 17, { align: 'center' });
      }
      
      // ============================================
      // SIGNATURE SECTION
      // ============================================
      const signatureY = pageHeight - 18;
      const signatureWidth = (contentWidth - 20) / 3;
      
      // Visitor Signature
      doc.setDrawColor(0, 0, 0);
      doc.setLineWidth(0.2);
      doc.line(margin, signatureY + 5, margin + signatureWidth - 5, signatureY + 5);
      
      doc.setFontSize(6);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(80, 80, 80);
      doc.text('Visitor Signature', margin + (signatureWidth/2) - 5, signatureY + 8, { align: 'center' });
      
      // Host Signature
      doc.line(margin + signatureWidth + 5, signatureY + 5, margin + (signatureWidth * 2), signatureY + 5);
      doc.text('Host Signature', margin + signatureWidth + 5 + (signatureWidth/2) - 5, signatureY + 8, { align: 'center' });
      
      // Security Signature
      doc.line(margin + (signatureWidth * 2) + 10, signatureY + 5, margin + (signatureWidth * 3) + 5, signatureY + 5);
      doc.text('Security Signature', margin + (signatureWidth * 2) + 10 + (signatureWidth/2) - 5, signatureY + 8, { align: 'center' });
      
      // ============================================
      // FOOTER / DISCLAIMER
      // ============================================
      doc.setFontSize(5);
      doc.setTextColor(120, 120, 120);
      doc.setFont('helvetica', 'normal');
      doc.text('This pass must be displayed at all times. Valid only for the date and purpose specified.', pageWidth / 2, pageHeight - 5, { align: 'center' });
      
      // ============================================
      // BORDER (optional)
      // ============================================
      doc.setDrawColor(180, 180, 180);
      doc.setLineWidth(0.2);
      doc.rect(2, 2, pageWidth - 4, pageHeight - 4, 'D');
      
      // Save the PDF
      const fileName = `Visitor_Pass_${resultData.visitorId}.pdf`;
      doc.save(fileName);
      
      console.log('PDF generated successfully');
      resolve();
      
    } catch (error) {
      console.error('Error generating PDF:', error);
      // Still resolve so the form flow continues
      resolve();
    }
  });
}
    // ================================================
    // UTILITY FUNCTIONS
    // ================================================
    
    function showMessage(content, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = content;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      messageDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    function clearForm() {
      document.getElementById('visitorName').value = '';
      document.getElementById('companyName').value = '';
      document.getElementById('contactNumber').value = '';
      document.getElementById('visitorAddress').value = '';
      document.getElementById('personToMeet').value = '';
      document.getElementById('areaToVisit').value = '';
      document.getElementById('purpose').value = '';
      document.getElementById('purposeDetails').value = '';
      document.getElementById('otherPurposeGroup').style.display = 'none';
      
      clearPhoto();
      
      document.querySelectorAll('.error-field').forEach(field => {
        field.classList.remove('error-field');
      });
      
      document.getElementById('message').style.display = 'none';
      document.getElementById('visitorName').focus();
      
      // Update visitor ID
      setDefaultVisitorId();
    }
    
    // Keyboard shortcuts
    document.addEventListener('keydown', function(event) {
      if (event.ctrlKey && event.key === 'Enter') {
        event.preventDefault();
        submitForm();
      }
      if (event.key === 'Escape') {
        event.preventDefault();
        if (confirm('Clear all form data?')) {
          clearForm();
        }
      }
    });
  </script>
